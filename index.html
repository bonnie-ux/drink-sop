.section{margin-bottom:40px}
.section-title{font-size:26px;font-weight:900;margin:26px 0 16px;color:#2b2b2b}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px}
.card{
  background:#fff;border-radius:24px;padding:22px;

  border:1px solid rgba(0,0,0,.03);
}

.drink-name{font-size:23px;font-weight:900;margin-bottom:14px;line-height:1.35}
.steps{line-height:1.9;color:#555;font-size:15.5px}
.step-line{display:block;padding:3px 0;border-bottom:1px dashed rgba(0,0,0,.05)}
.step-line:last-child{border-bottom:none}
.step-no{color:#ff6b00;font-weight:900;margin-right:4px}
.amount{color:#d9361c;font-weight:900;background:#fff3f0;padding:1px 4px;border-radius:6px}
.tool{color:#1f6feb;font-weight:800}
.note{color:#079455;font-weight:800;background:#ecfdf3;padding:1px 4px;border-radius:6px}
.empty{display:none;text-align:center;color:#888;padding:50px 20px}
footer{text-align:center;padding:40px 20px;color:#888}
.hidden{display:none!important}
@media(max-width:640px){
  header{padding:16px}
  .title{font-size:24px}
  .container{padding:16px}
  .grid{grid-template-columns:1fr}
  .drink-name{font-size:21px}
  .search{flex-direction:column;align-items:stretch}
}

const categoryOrder = ["義式咖啡", "果香冰咖啡", "在地茶", "鮮奶茶歐蕾", "特調花果茶", "鮮果氣泡飲", "風味調酒", "健康果昔"];
let activeCategory = '全部';

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function highlight(text) {
  let s = escapeHtml(text);
  s = s.replace(/^(\s*)(\d+\.)\s*/g, '$1<span class="step-no">$2</span> ');
  s = s.replace(/(\d+(?:\.\d+)?\s*(?:ml|g|顆|包|片|下|秒|分鐘|分滿|℃))/g, '<span class="amount">$1</span>');
  s = s.replace(/(磨豆機|熱飲茶壺|茶壺|玻璃壺|玻璃冰壺|梅森瓶|咖啡冰杯|冰杯|熱杯|奶泡鋼杯|冰奶泡杯|啤酒杯|優格杯|冰沙機|歐蕾冰杯|鋼杯)/g, '<span class="tool">$1</span>');
  s = s.replace(/(氣泡水加滿|倒冰奶泡至滿杯|灑滿黑糖粉|加薄荷葉裝飾|不加冰塊|不能加檸檬片|不夠高再加果片\+冰塊|攪勻|裝飾|倒冰塊上)/g, '<span class="note">$1</span>');
  return s;
}

function getCategories() {
  const set = [...new Set(recipes.map(r => r.category))];
  return set.sort((a,b) => {
    const ia = categoryOrder.indexOf(a);
    const ib = categoryOrder.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const categories = ['全部', ...getCategories()];
  tabs.innerHTML = categories.map(cat => `<button class="tab ${cat === activeCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderTabs();
  renderRecipes();
}

function recipeMatches(recipe, keyword) {
  const text = [recipe.category, recipe.name, ...recipe.steps].join(' ').toLowerCase();
  return text.includes(keyword);
}

function renderRecipes() {
  const app = document.getElementById('app');
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = recipes.filter(r => {
    const catOk = activeCategory === '全部' || r.category === activeCategory;
    const searchOk = !keyword || recipeMatches(r, keyword);
    return catOk && searchOk;
  });

  const grouped = {};
  filtered.forEach(r => {
    if (!grouped[r.category]) grouped[r.category] = [];
    grouped[r.category].push(r);
  });

  const categories = getCategories().filter(cat => grouped[cat]);
  app.innerHTML = categories.map(cat => `
    <div class="section">
      <div class="section-title">${cat}</div>
      <div class="grid">
        ${grouped[cat].map(r => `
          <div class="card">
            <div class="badge">${escapeHtml(r.category)}</div>
            <div class="drink-name">${escapeHtml(r.name)}</div>
            <div class="steps">
              ${r.steps.map(step => `<span class="step-line">${highlight(step)}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('countText').textContent = `${filtered.length} / ${recipes.length} 筆`;
}

document.getElementById('searchInput').addEventListener('input', renderRecipes);
renderTabs();
renderRecipes();
</script>
