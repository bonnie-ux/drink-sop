const categories = ['全部', ...Array.from(new Set(recipes.map(r => r.category)))];
let active = '全部';
const q = document.getElementById('q');
const grid = document.getElementById('grid');
const count = document.getElementById('count');
const empty = document.getElementById('empty');
const filters = document.getElementById('filters');
function esc(s){return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function makeFilters(){filters.innerHTML = categories.map(c => `<button class="chip ${c===active?'active':''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('');}
function match(r, kw){const hay = (r.title+' '+r.category+' '+r.tags.join(' ')+' '+r.body.join(' ')).toLowerCase(); return !kw || hay.includes(kw.toLowerCase());}
function render(){const kw=q.value.trim(); const rows=recipes.filter(r => (active==='全部'||r.category===active) && match(r,kw)); count.textContent = `目前顯示 ${rows.length} / ${recipes.length} 筆配方`; empty.style.display = rows.length ? 'none' : 'block'; grid.innerHTML = rows.map(r => `<article class="card"><div class="cardHead"><h2>${esc(r.title)}</h2><span class="cat">${esc(r.category)}</span></div><div class="tags">${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><div class="steps">${esc(r.body.join('
'))}</div><div class="slide">來源頁碼：P${r.slide}</div></article>`).join('');}
filters.addEventListener('click', e => { if(e.target.dataset.cat){ active=e.target.dataset.cat; makeFilters(); render(); } });
document.getElementById('clear').onclick = () => { q.value=''; active='全部'; makeFilters(); render(); q.focus(); };
q.addEventListener('input', render);
makeFilters(); render();
</script>
